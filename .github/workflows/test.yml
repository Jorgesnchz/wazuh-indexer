name: "Changelog Verifier"
on:
  push:
  workflow_dispatch:

jobs:
  test-docker-rpm:
    if: (0 == 1)
    runs-on: ubuntu-latest
    container: 
      image: redhat/ubi9:latest
    steps:   
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Test
      run: |
        echo "Testing Docker volumes"
        bash tools/test.sh
  
  test-deb:
    runs-on: ubuntu-latest
    container: 
      image: debian:latest
    steps:   
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Test
      run: |
        echo "Testing Docker volumes"
        bash tools/test.sh
  

  job-after:
    needs: 
      - test-docker-rpm
      - test-deb
    if: |
     ((needs.test-docker-rpm.conclusion == 'success' && needs.test-deb.conclusion == 'skipped') || (needs.test-deb.conclusion == 'success' && needs.test-docker-rpm.conclusion == 'skipped'))
    runs-on: ubuntu-latest
    steps:
    - name: print message
      run: |
        echo "This job runs after either test-docker-rpm or test-deb completes successfully."
        echo "You can add more steps here to perform actions after the tests."